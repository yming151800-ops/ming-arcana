<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ming Arcana · 云端抽牌 · v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{
  --sky-1:#eaf3ff;      /* 最浅天蓝白 */
  --sky-2:#d6e8ff;      /* 浅天蓝 */
  --sky-3:#b8d4f5;      /* 中天蓝 */
  --blue-deep:#3b6fb0;  /* 深蓝（文字/描边） */
  --blue-ink:#27486f;   /* 墨蓝（主文字） */
  --blue-soft:#5b8dd0;  /* 柔蓝 */
  --gold:#c9a86a;       /* 低调暖金（点缀） */
  --gold-soft:#e3cfa0;
  --cloud:#ffffff;
  --glass:rgba(255,255,255,0.55);
  --glass-strong:rgba(255,255,255,0.78);
  --shadow-blue:rgba(91,141,208,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Noto Serif SC",-apple-system,"PingFang SC","Microsoft YaHei",serif;
  color:var(--blue-ink);
  background:linear-gradient(180deg,#eaf3ff 0%,#dcebff 35%,#cfe3ff 70%,#c4dcff 100%);
  overflow-x:hidden;
  user-select:none;
  position:relative;
  min-height:100vh;
}

/* ========== 梦幻云朵背景 ========== */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.cloud-layer{position:absolute;inset:0;}
.cloud{
  position:absolute;
  background:radial-gradient(closest-side, rgba(255,255,255,0.95), rgba(255,255,255,0.6) 60%, rgba(255,255,255,0) 100%);
  border-radius:50%;
  filter:blur(8px);
  opacity:0.8;
}
.cloud::before,.cloud::after{
  content:"";position:absolute;border-radius:50%;
  background:radial-gradient(closest-side, rgba(255,255,255,0.95), rgba(255,255,255,0) 100%);
  filter:blur(6px);
}
.c1{width:340px;height:160px;top:8%;left:-10%;animation:float1 80s linear infinite;}
.c1::before{width:200px;height:200px;top:-80px;left:50px;}
.c1::after{width:160px;height:160px;top:-40px;left:180px;}
.c2{width:280px;height:130px;top:32%;left:60%;animation:float2 100s linear infinite;}
.c2::before{width:170px;height:170px;top:-70px;left:40px;}
.c2::after{width:130px;height:130px;top:-30px;left:150px;}
.c3{width:400px;height:180px;top:62%;left:-20%;animation:float1 120s linear infinite;animation-delay:-30s;}
.c3::before{width:230px;height:230px;top:-90px;left:70px;}
.c3::after{width:180px;height:180px;top:-50px;left:220px;}
.c4{width:240px;height:120px;top:78%;left:70%;animation:float2 90s linear infinite;animation-delay:-20s;}
.c4::before{width:150px;height:150px;top:-60px;left:30px;}
.c4::after{width:120px;height:120px;top:-25px;left:130px;}
@keyframes float1{from{transform:translateX(0)}to{transform:translateX(130vw)}}
@keyframes float2{from{transform:translateX(0)}to{transform:translateX(-130vw)}}

/* 漂浮微光点（星尘） */
.dust{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 6px #fff,0 0 12px rgba(201,168,106,0.5);animation:twinkle 4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:0.9;transform:scale(1.2)}}

/* 顶部柔光 */
.sky::after{
  content:"";position:absolute;top:-30%;left:50%;transform:translateX(-50%);
  width:120%;height:60%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.7), rgba(255,255,255,0) 70%);
  pointer-events:none;
}

/* ========== 启动屏 ========== */
.intro{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
  background:linear-gradient(180deg,#eef5ff 0%,#dcebff 60%,#cfe3ff 100%);
  transition:opacity .9s,visibility .9s;
}
.intro.hide{opacity:0;visibility:hidden;}
.intro .moon{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%, #ffffff, #eaf3ff 55%, #cfe0f7 100%);
  box-shadow:0 0 50px rgba(255,255,255,0.9),0 0 90px rgba(184,212,245,0.7), inset -12px -12px 30px rgba(150,180,220,0.35);
  margin-bottom:28px;position:relative;animation:breathe 6s ease-in-out infinite;
}
.intro .moon::after{
  content:"✦";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:38px;color:var(--gold);text-shadow:0 0 14px rgba(201,168,106,0.6);
}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 50px rgba(255,255,255,0.9),0 0 90px rgba(184,212,245,0.7), inset -12px -12px 30px rgba(150,180,220,0.35)}50%{transform:scale(1.05);box-shadow:0 0 70px rgba(255,255,255,1),0 0 120px rgba(184,212,245,0.9), inset -12px -12px 30px rgba(150,180,220,0.35)}}
.intro .name{
  font-family:"Ma Shan Zheng","Noto Serif SC",serif;
  font-size:52px;letter-spacing:10px;color:var(--blue-ink);
  text-shadow:0 2px 18px rgba(255,255,255,0.9);margin-bottom:6px;
}
.intro .slogan{font-size:13px;letter-spacing:6px;color:var(--blue-soft);margin-bottom:8px;opacity:.85;}
.intro .desc{font-size:13px;letter-spacing:2px;color:var(--blue-soft);line-height:1.9;max-width:300px;margin-bottom:40px;opacity:.9;}
.intro-btn{
  font-family:"Noto Serif SC",serif;
  padding:15px 52px;font-size:17px;letter-spacing:8px;
  color:#fff;border:none;border-radius:40px;cursor:pointer;
  background:linear-gradient(135deg,var(--blue-soft),var(--blue-deep));
  box-shadow:0 10px 30px var(--shadow-blue),inset 0 1px 1px rgba(255,255,255,0.5);
  transition:transform .25s,box-shadow .25s;
}
.intro-btn:hover{transform:translateY(-3px);box-shadow:0 16px 40px var(--shadow-blue),inset 0 1px 1px rgba(255,255,255,0.6);}
.intro-btn:active{transform:translateY(0);}
.intro .privacy{margin-top:26px;font-size:11px;letter-spacing:1px;color:var(--blue-soft);opacity:.7;line-height:1.7;}

/* ========== 主舞台 ========== */
.stage{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 16px 40px;}
.topbar{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.brand{font-family:"Ma Shan Zheng",serif;font-size:26px;letter-spacing:4px;color:var(--blue-ink);}
.brand small{font-family:"Noto Serif SC";font-size:10px;letter-spacing:3px;color:var(--blue-soft);display:block;margin-top:-2px;}

/* 步骤指示 */
.steps{display:flex;gap:8px;align-items:center;font-size:12px;letter-spacing:1px;color:var(--blue-soft);}
.steps .stp{padding:4px 10px;border-radius:20px;background:var(--glass);transition:all .3s;opacity:.6;}
.steps .stp.on{background:linear-gradient(135deg,var(--blue-soft),var(--blue-deep));color:#fff;opacity:1;box-shadow:0 4px 12px var(--shadow-blue);}

/* 牌阵选择（始终可见） */
.spread-picker{width:100%;max-width:760px;margin:6px 0 14px;position:sticky;top:0;z-index:30;}
.spread-picker .label{font-size:12px;letter-spacing:2px;color:var(--blue-soft);margin-bottom:8px;text-align:center;}
.spread-tabs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.spread-tab{
  cursor:pointer;border-radius:18px;padding:10px 16px;min-width:140px;
  background:var(--glass);backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,0.7);
  box-shadow:0 6px 18px rgba(91,141,208,0.12);
  transition:all .25s;text-align:center;
}
.spread-tab:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(91,141,208,0.2);}
.spread-tab.active{
  background:linear-gradient(135deg,rgba(91,141,208,0.95),rgba(59,111,176,0.95));
  border-color:rgba(255,255,255,0.9);
  box-shadow:0 12px 28px var(--shadow-blue);
}
.spread-tab.active .st-name,.spread-tab.active .st-meta{color:#fff;}
.st-name{font-size:15px;font-weight:600;letter-spacing:2px;color:var(--blue-ink);margin-bottom:2px;}
.st-meta{font-size:11px;letter-spacing:1px;color:var(--blue-soft);}

/* 问题输入 */
.question-box{width:100%;max-width:520px;margin:0 auto 16px;display:flex;gap:8px;}
.question-box input{
  flex:1;font-family:"Noto Serif SC",serif;font-size:14px;letter-spacing:1px;
  padding:12px 18px;border-radius:24px;border:1.5px solid rgba(255,255,255,0.8);
  background:var(--glass-strong);color:var(--blue-ink);outline:none;
  box-shadow:inset 0 1px 4px rgba(91,141,208,0.1);
}
.question-box input::placeholder{color:var(--blue-soft);opacity:.7;}

/* 摄像头预览 */
/* 摄像头相关样式已移除 */
.video-frame{
  position:absolute;inset:0;border-radius:24px;overflow:hidden;
  background:linear-gradient(135deg,#dcebff,#c4dcff);
  border:2px solid rgba(255,255,255,0.85);
  box-shadow:0 14px 40px rgba(91,141,208,0.3),inset 0 0 30px rgba(255,255,255,0.4);
}
.video-frame video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.video-frame .overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(196,220,255,0.4) 100%);pointer-events:none;}
.corner{position:absolute;width:22px;height:22px;border:2px solid #fff;opacity:.9;}
.corner.tl{top:12px;left:12px;border-right:none;border-bottom:none;border-radius:6px 0 0 0;}
.corner.tr{top:12px;right:12px;border-left:none;border-bottom:none;border-radius:0 6px 0 0;}
.corner.bl{bottom:12px;left:12px;border-right:none;border-top:none;border-radius:0 0 0 6px;}
.corner.br{bottom:12px;right:12px;border-left:none;border-top:none;border-radius:0 0 6px 0;}
.hand-hint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:12px;letter-spacing:1px;color:var(--blue-deep);
  padding:5px 14px;background:rgba(255,255,255,0.85);border-radius:20px;
  opacity:0;transition:opacity .4s;white-space:nowrap;
}
.hand-hint.show{opacity:1;animation:hintpulse 1.6s ease-in-out infinite;}
@keyframes hintpulse{0%,100%{opacity:.75}50%{opacity:1}}
.detect-ring{
  position:absolute;top:50%;left:50%;width:90px;height:90px;
  border:3px solid rgba(255,255,255,0.8);border-radius:50%;
  transform:translate(-50%,-50%) scale(0);transition:transform .3s,border-color .3s,box-shadow .3s;pointer-events:none;
}
.detect-ring.active{transform:translate(-50%,-50%) scale(1);}
.detect-ring.locked{border-color:var(--gold);box-shadow:0 0 26px var(--gold-soft);}

/* 摄像头授权失败引导卡 */
.cam-error{
  position:absolute;inset:0;border-radius:24px;
  background:var(--glass-strong);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:18px;text-align:center;border:2px solid rgba(255,255,255,0.85);
}
.cam-error.show{display:flex;}
.cam-error .ce-icon{font-size:30px;margin-bottom:8px;}
.cam-error .ce-title{font-size:14px;font-weight:600;color:var(--blue-ink);margin-bottom:6px;letter-spacing:1px;}
.cam-error .ce-msg{font-size:12px;color:var(--blue-soft);line-height:1.7;margin-bottom:14px;}
.cam-error .ce-btns{display:flex;gap:8px;}
.ce-btn{font-family:"Noto Serif SC";font-size:12px;letter-spacing:1px;padding:8px 16px;border-radius:20px;cursor:pointer;border:none;}
.ce-btn.primary{background:linear-gradient(135deg,var(--blue-soft),var(--blue-deep));color:#fff;}
.ce-btn.ghost{background:rgba(255,255,255,0.7);color:var(--blue-deep);border:1.5px solid rgba(91,141,208,0.3);}

/* ========== 牌桌 ========== */
.table{width:100%;max-width:860px;min-height:200px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin:8px 0 18px;position:relative;}

/* 牌桌 + 牌堆 组合 */
.play-area{
  width:100%;max-width:760px;display:flex;align-items:flex-end;justify-content:center;gap:18px;margin:8px auto 14px;position:relative;flex-wrap:wrap;
}
.play-area .table{flex:1;min-width:280px;min-height:170px;margin:0;}
.empty-table{
  width:100%;text-align:center;color:var(--blue-soft);font-size:13px;letter-spacing:1px;padding:36px 0;opacity:0.6;
  border:1.5px dashed rgba(91,141,208,0.3);border-radius:18px;
}
.deck-zone{
  width:120px;min-height:170px;display:flex;align-items:flex-end;justify-content:center;position:relative;flex-shrink:0;
}
.deck-zone .deck{width:104px;height:168px;margin:0 auto;}

/* 空槽位：与牌面视觉区分 */
.slot.empty{
  width:82px;height:132px;border-radius:10px;
  border:1.5px dashed rgba(91,141,208,0.4);
  display:flex;align-items:center;justify-content:center;
  color:var(--blue-soft);font-size:12px;letter-spacing:1px;
  background:rgba(255,255,255,0.2);
  position:relative;
}
.slot.empty::after{
  content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--blue-soft);opacity:0.5;
}
.slot.empty .pos-label-empty{font-size:11px;}

/* 牌堆 */
.deck{position:relative;width:104px;height:168px;cursor:pointer;}
.deck .deck-card{position:absolute;inset:0;border-radius:12px;}
.deck:hover .deck-top{transform:translateY(-8px);}
.deck-hint{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:12px;color:var(--blue-soft);letter-spacing:1px;}

/* 牌堆震颤动画 */
.deck.shaking{
  animation:deckShake .12s ease-in-out infinite;
  cursor:default;
}
@keyframes deckShake{
  0%,100%{transform:rotate(0deg) translateX(0);}
  20%{transform:rotate(-1.8deg) translateX(-4px);}
  40%{transform:rotate(1.6deg) translateX(4px);}
  60%{transform:rotate(-1.2deg) translateX(-3px);}
  80%{transform:rotate(1.2deg) translateX(3px);}
}
/* 飞牌动画 */
.fly-card{
  pointer-events:none;position:fixed;
  z-index:150;
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
}
.fly-card .inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .4s cubic-bezier(.4,.0,.2,1);
}
.fly-card.flipping .inner{transform:rotateY(180deg);}

/* 单张牌（通用） */
.card{
  width:104px;height:168px;position:relative;perspective:1000px;cursor:default;flex-shrink:0;
}
.card .inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,.0,.2,1);}
.card.flipped .inner{transform:rotateY(180deg);}
.card .face{
  position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;box-shadow:0 10px 26px rgba(91,141,208,0.3);
}
/* 牌背：云蓝曼陀罗 */
.card .back{
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.9) 0%, rgba(214,232,255,0.4) 30%, transparent 55%),
    linear-gradient(135deg,#5b8dd0,#3b6fb0);
  border:2px solid rgba(255,255,255,0.85);
  display:flex;align-items:center;justify-content:center;
}
.card .back .mandala{width:70%;height:70%;border:2px solid rgba(255,255,255,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.card .back .mandala::before{content:"";position:absolute;width:60%;height:60%;border:1.5px solid rgba(255,255,255,0.55);border-radius:50%;}
.card .back .mandala::after{content:"✦";font-size:26px;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.9);}
/* 牌面：白底蓝边 */
.card .front{
  transform:rotateY(180deg);
  background:linear-gradient(165deg,#ffffff 0%,#f2f8ff 100%);
  border:2px solid var(--blue-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:8px 5px;color:var(--blue-ink);
}
.card .front .f-top{font-size:10px;letter-spacing:1px;color:var(--blue-soft);}
.card .front .f-icon{font-size:30px;line-height:1;margin:2px 0;}
.card .front .f-name{font-size:13px;font-weight:600;letter-spacing:1px;text-align:center;line-height:1.2;}
.card .front .f-en{font-size:8px;letter-spacing:.5px;color:var(--blue-soft);text-align:center;}
.card .front .f-rev{position:absolute;top:6px;right:6px;font-size:9px;color:#c25b5b;border:1px solid #d98a8a;border-radius:8px;padding:1px 5px;background:rgba(255,235,235,0.8);}
.card.reversed .front .f-icon,.card.reversed .front .f-name,.card.reversed .front .f-en{transform:rotate(180deg);}

/* 牌位标签 */
.slot{display:flex;flex-direction:column;align-items:center;gap:6px;}
.slot .pos-label{font-size:11px;letter-spacing:1px;color:var(--blue-soft);min-height:14px;text-align:center;max-width:110px;line-height:1.3;}

/* 凯尔特十字专属网格布局 */
.table.celtic{display:grid;gap:8px;max-width:560px;
  grid-template-columns:repeat(4,1fr);
  grid-template-areas:
    ".    crown past  ."
    "rec  core  near  staff1"
    ".    found .     staff2"
    ".    .     .     staff3"
    ".    .     .     staff4";
  align-items:center;justify-items:center;}
.table.celtic .slot{transform:scale(.82);}
.table.celtic .s-core{grid-area:core;position:relative;z-index:2;}
.table.celtic .s-cross{grid-area:core;z-index:3;transform:rotate(90deg) scale(.82);}
.table.celtic .s-crown{grid-area:crown;}
.table.celtic .s-found{grid-area:found;}
.table.celtic .s-past{grid-area:past;}
.table.celtic .s-rec{grid-area:rec;}
.table.celtic .s-near{grid-area:near;}
.table.celtic .s-staff1{grid-area:staff1;}
.table.celtic .s-staff2{grid-area:staff2;}
.table.celtic .s-staff3{grid-area:staff3;}
.table.celtic .s-staff4{grid-area:staff4;}

/* ========== 控制区 ========== */
.controls{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:520px;}
.status{font-size:14px;letter-spacing:1px;color:var(--blue-deep);text-align:center;min-height:22px;line-height:1.5;}
.status .hl{color:var(--gold);font-weight:600;}
.btn{
  font-family:"Noto Serif SC",serif;
  padding:14px 44px;font-size:16px;letter-spacing:6px;color:#fff;border:none;border-radius:36px;cursor:pointer;
  background:linear-gradient(135deg,var(--blue-soft),var(--blue-deep));
  box-shadow:0 10px 28px var(--shadow-blue),inset 0 1px 1px rgba(255,255,255,0.5);
  transition:transform .25s,box-shadow .25s,opacity .25s;
}
.btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 16px 36px var(--shadow-blue);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-ghost{
  padding:9px 20px;font-size:12px;letter-spacing:2px;border-radius:24px;
  background:var(--glass-strong);color:var(--blue-deep);border:1.5px solid rgba(91,141,208,0.3);
  box-shadow:none;
}
.btn-ghost:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 16px rgba(91,141,208,0.15);}

/* ========== 解读面板 ========== */
.reading{
  position:fixed;inset:0;z-index:200;overflow-y:auto;
  background:linear-gradient(180deg,rgba(234,243,255,0.97),rgba(207,227,255,0.97));
  backdrop-filter:blur(16px);
  opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s;
  padding:30px 18px 50px;
}
.reading.show{opacity:1;visibility:visible;}
.reading-inner{max-width:680px;margin:0 auto;}
.reading-head{text-align:center;margin-bottom:8px;}
.reading-head h2{font-family:"Ma Shan Zheng",serif;font-size:30px;letter-spacing:4px;color:var(--blue-ink);}
.reading-head .r-sub{font-size:12px;letter-spacing:2px;color:var(--blue-soft);margin-top:4px;}
.reading-head .r-q{font-size:13px;color:var(--blue-deep);margin-top:10px;font-style:italic;}

/* 故事主体 */
.story{
  background:var(--glass-strong);border-radius:22px;padding:26px 24px;margin:22px 0;
  border:1.5px solid rgba(255,255,255,0.9);box-shadow:0 16px 40px rgba(91,141,208,0.15);
  position:relative;
}
.story::before{content:"❝";position:absolute;top:8px;left:16px;font-size:46px;color:var(--gold-soft);font-family:serif;line-height:1;opacity:.6;}

.story p{font-size:15px;line-height:2.05;color:var(--blue-ink);letter-spacing:.5px;margin-bottom:14px;text-indent:0;}

.story .accent{color:var(--blue-deep);font-weight:600;}
.story .ghost-name{color:var(--gold);font-weight:600;}

/* 逐牌卡 */
.cards-detail{display:flex;flex-direction:column;gap:14px;margin:22px 0;}
.cd-item{

}
.cd-mini{width:54px;height:86px;border-radius:8px;flex-shrink:0;

  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.cd-mini .m-icon{font-size:22px;}
.cd-mini .m-name{font-size:9px;color:var(--blue-ink);letter-spacing:.5px;text-align:center;line-height:1.1;}
.cd-mini.rev .m-icon,.cd-mini.rev .m-name{transform:rotate(180deg);}
.cd-body{flex:1;}
.cd-pos{font-size:11px;letter-spacing:1px;color:var(--gold);margin-bottom:3px;}
.cd-name{font-size:15px;font-weight:600;color:var(--blue-ink);margin-bottom:4px;}
.cd-name .orient{font-size:11px;font-weight:400;margin-left:6px;padding:1px 7px;border-radius:8px;}

.cd-name .orient.rev{color:#c25b5b;background:rgba(220,138,138,0.15);}
.cd-keys{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.cd-keys .k{font-size:10px;padding:2px 9px;border-radius:11px;background:rgba(201,168,106,0.15);color:#a8843f;}
.cd-text{font-size:13px;line-height:1.8;color:var(--blue-ink);}

.r-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;}

/* 抽牌飞舞光点 */
.spark{position:fixed;width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff,0 0 18px var(--gold-soft);pointer-events:none;z-index:150;}

/* 隐私角标 */
.privacy-tip{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:3;font-size:10px;letter-spacing:1px;color:var(--blue-soft);opacity:.6;}

@media(max-width:600px){
  .card,.deck{width:88px;height:142px;}

  .table.celtic{max-width:380px;}
}
@media(max-width:380px){
  .card,.deck{width:74px;height:120px;}
}

/* ===================== 解读引擎（故事性叙事） ===================== */
// 工具：取牌的方向化关键词与短意
function meaning(c){ return c.reversed ? c.reversed : c.upright; }
function shortKeys(c){ return (c.keywords||[]).slice(0,3).join('、'); }
function arcanaWeight(deck){ // 大牌占比 → 命运感
  const majors = deck.filter(c=>c.arcana==='major').length;
  return majors / deck.length;
}
function suitTone(deck){ // 主导花色 → 议题底色
  const cnt={wands:0,cups:0,swords:0,pentacles:0};
  deck.forEach(c=>{ if(c.suit) cnt[c.suit]++; });
  const max=Math.max(cnt.wands,cnt.cups,cnt.swords,cnt.pentacles);
  if(max===0) return null;
  if(cnt.cups===max) return {suit:'cups', word:'情感与关系'};
  if(cnt.swords===max) return {suit:'swords', word:'思绪与抉择'};
  if(cnt.wands===max) return {suit:'wands', word:'行动与热情'};
  return {suit:'pentacles', word:'现实与积累'};
}
// 连接词库（中性神谕）
const CONNECT = ['于是','也因此','顺着这条脉络','继而','同时','随之'];
const DIVINE = ['提示','揭示','表明','暗示'];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// 主入口：根据牌阵类型生成故事 HTML
function buildStory(spreadKey, cards, question){
  const q = question && question.trim() ? question.trim() : '';
  const tone = suitTone(cards);
  const fate = arcanaWeight(cards);
  let html = '';

  if(spreadKey==='single'){
    html = storySingle(cards[0], q, tone);
  } else if(spreadKey==='three'){
    html = storyThree(cards, q, tone);
  } else if(spreadKey==='choice'){
    html = storyChoice(cards, q, tone);
  } else if(spreadKey==='relation'){
    html = storyRelation(cards, q, tone);
  } else if(spreadKey==='celtic'){
    html = storyCeltic(cards, q, tone, fate);
  }

  // 尾声：花色/命运感的整体提点
  let coda = '';
  if(tone){
    coda += `这一摊牌中，<span class="accent">${tone.word}</span>的能量最为突出——它是当前阶段的主旋律。`;
  }
  if(fate>0.5){
    coda += `大阿尔卡那占比较高，说明正在展开的并非日常小事，而是一段有分量的必经之路。顺势而为，而非抗拒，是牌面给出的建议。`;
  } else if(fate===0){
    coda += `牌面全部为小阿尔卡那，暗示局面的主动权在现实层面——每一步的累积将决定走向。`;
  }
  if(coda) html += `<p>${coda}</p>`;
  return html;
}

function orientWord(c){ return c.reversed ? '逆位' : '正位'; }

// —— 单张
function storySingle(c, q, tone){
  let p1 = q
    ? `你问的是「${esc(q)}」。牌面给出的回答，是<span class="ghost-name">${c.name}（${orientWord(c)}）</span>。`
    : `此刻显现的，是<span class="ghost-name">${c.name}（${orientWord(c)}）</span>。`;
  let p2 = `${meaning(c)}`;
  let p3 = c.reversed
    ? `逆位不是判词，而是一个观察点：此处能量受阻或过度。关键不在于对抗，而在于看清它在提醒你什么。`
    : `这张牌的能量是正向的、流动的。「${shortKeys(c)}」是它的核心信息——值得你纳入当前的考量。`;
  return `<h3>回答</h3><p>${p1}</p><p>${p2}</p><p>${p3}</p>`;
}

// —— 三牌阵：过去→现在→未来
function storyThree(cards, q, tone){
  const [past, now, fut] = cards;
  let head = q ? `关于「${esc(q)}」，三张牌连成一条时间线——` : `三张牌展开一段轨迹——`;
  let p1 = `过去的位置是<span class="ghost-name">${past.name}（${orientWord(past)}）</span>。${meaning(past)}这是来路——构成此刻根基的那段历程。`;
  let p2 = `${pick(CONNECT)}，现在的位置是<span class="ghost-name">${now.name}（${orientWord(now)}）</span>。${meaning(now)}${past.arcana==='major'&&now.arcana==='major' ? '过去与现在皆为大牌，说明这是一段有分量的历程，不是暂时的波动。' : '这就是当下的坐标。'}`;
  let bridge = relate(now, fut);
  let p3 = `未来的方向指向<span class="ghost-name">${fut.name}（${orientWord(fut)}）</span>。${meaning(fut)}${bridge}`;
  let p4 = fut.reversed
    ? `未来这张为逆位——它提供的不是判决，而是一个预警：若照当前惯性前行，此处可能会遇到阻力。意识到它，路径便可以调整。`
    : `这一方向处于正向流动中。它所指向的轨迹值得留意。`;
  return `<h3>时间之流</h3><p>${head}</p><p>${p1}</p><p>${p2}</p><p>${p3}</p><p>${p4}</p>`;
}

// 两张牌之间的关系过渡
function relate(a, b){
  if(a.suit && b.suit && a.suit===b.suit) return '两张牌同属一个元素，能量是连续的——前后的轨迹没有断裂。';
  if(a.arcana==='major' && b.arcana==='minor') return '从大牌走向小牌，意味着一个宏观主题正在落到具体的现实中。';
  if(a.arcana==='minor' && b.arcana==='major') return '从小牌走向大牌，说明一件日常之事可能导向一个更重要的节点。';
  if(a.reversed && !b.reversed) return '由逆转正，能量正在由阻塞走向通畅。';
  if(!a.reversed && b.reversed) return '由正转逆，前方存在一个需要注意的关卡。';
  return '这两张之间存在张力——而张力本身是变化的先兆。';
}

// —— 关系之镜（5张）
function storyRelation(cards, q, tone){
  const [you, them, bond, obs, out] = cards;
  let head = q ? `关于「${esc(q)}」这段关系，牌面呈现出五个切面——` : `这面镜子映射出关系的五个切面——`;
  let p1 = `你的位置：<span class="ghost-name">${you.name}（${orientWord(you)}）</span>。${meaning(you)}`;
  let p2 = `对方的位置：<span class="ghost-name">${them.name}（${orientWord(them)}）</span>。${meaning(them)}${relate(you,them)}`;
  let p3 = `<span class="ghost-name">${bond.name}（${orientWord(bond)}）</span>，代表着这段关系的联结本身。${meaning(bond)}`;
  let p4 = `横亘的课题是<span class="ghost-name">${obs.name}（${orientWord(obs)}）</span>。${meaning(obs)}`;
  let p5 = `在当前轨迹上，这段关系走向<span class="ghost-name">${out.name}（${orientWord(out)}）</span>。${meaning(out)}${out.reversed?'逆位在这里意味着这条路径存在变数——结局尚未锁死。':'顺位指向一个稳定的方向——但牌阵不预言，它只揭示当前势能的延伸。'}`;
  return `<h3>关系之镜</h3><p>${head}</p><p>${p1}</p><p>${p2}</p><p>${p3}</p><p>${p4}</p><p>${p5}</p>`;
}

// —— 选择牌阵（5张：二选一决策）
function storyChoice(cards, q, tone){
  const [curr, devA, devB, resA, resB] = cards;
  let head = q ? `关于「${esc(q)}」的抉择，牌面展开两条路径——` : `面对选择，牌面展开两条路径——`;
  let p1 = `你的现状由<span class="ghost-name">${curr.name}（${orientWord(curr)}）</span>代表。${meaning(curr)}这是你站在岔路口时的起点。`;
  let p2 = `选项A的走向是<span class="ghost-name">${devA.name}（${orientWord(devA)}）</span>。${meaning(devA)}${relate(curr,devA)}`;
  let p3 = `选项B的走向是<span class="ghost-name">${devB.name}（${orientWord(devB)}）</span>。${meaning(devB)}${relate(curr,devB)}`;
  let p4 = `若持续走A，结果指向<span class="ghost-name">${resA.name}（${orientWord(resA)}）</span>。${meaning(resA)}${relate(devA,resA)}`;
  let p5 = `若选择B，结果指向<span class="ghost-name">${resB.name}（${orientWord(resB)}）</span>。${meaning(resB)}${relate(devB,resB)}`;
  // 元素对比
  let comp = '';
  if(devA.suit && devB.suit){
    if(devA.suit===devB.suit) comp = '两条路径的元素相同——表面是二选一，但无论选哪条，核心议题一致。';
    else comp = `选项A的基调是「${suitWord(devA.suit)}」，选项B的基调是「${suitWord(devB.suit)}」——你选择的本质不是事情，而是一种能量。`;
  }
  return `<h3>选择牌阵</h3><p>${head}</p><p>${p1}</p><p>${p2}</p><p>${p3}</p><p>${p4}</p><p>${p5}</p>${comp?`<p>${comp}</p>`:''}`;
}
function suitWord(s){ return {wands:'行动与创造',cups:'情感与关系',swords:'思绪与抉择',pentacles:'现实与积累'}[s]||s; }

// —— 凯尔特十字（10张，分三幕）
function storyCeltic(cards, q, tone, fate){
  const m = {};
  SPREADS.celtic.positions.forEach((pos,i)=>{ m[pos.key]=cards[i]; });
  let head = q ? `关于「${esc(q)}」，凯尔特十字展开完整的结构。分三幕来读——` : `凯尔特十字展开完整的结构。分三幕来读——`;

  // 第一幕：核心张力
  let act1 = `<h3>第一幕 · 核心张力</h3>`;
  act1 += `<p>全局的圆心是<span class="ghost-name">${m.core.name}（${orientWord(m.core)}）</span>——${meaning(m.core)}横亘其上的挑战是<span class="ghost-name">${m.cross.name}（${orientWord(m.cross)}）</span>。${meaning(m.cross)}</p>`;
  act1 += `<p>这两张的对照构成了整个问题的核心张力：一边是当下，一边是需要面对的力量。理解了这组关系，后面的信息便有了参照。</p>`;

  // 第二幕：时间线
  let act2 = `<h3>第二幕 · 时间线索</h3>`;
  act2 += `<p>根基深处是<span class="ghost-name">${m.found.name}（${orientWord(m.found)}）</span>——${meaning(m.found)}这是潜层之下的远因，未必在意识层面。</p>`;
  act2 += `<p>近期过去是<span class="ghost-name">${m.past.name}（${orientWord(m.past)}）</span>。${meaning(m.past)}它正在退场，但遗存仍在。</p>`;
  act2 += `<p>意识朝向的目标是<span class="ghost-name">${m.crown.name}（${orientWord(m.crown)}）</span>。${meaning(m.crown)}${tensionCheck(m.found,m.crown)}</p>`;
  act2 += `<p>未来数周将浮现的能量是<span class="ghost-name">${m.near.name}（${orientWord(m.near)}）</span>。${meaning(m.near)}这是下一段情节，并非终局。</p>`;

  // 第三幕：从内在到外在
  let act3 = `<h3>第三幕 · 走向结局</h3>`;
  act3 += `<p>自我态度由<span class="ghost-name">${m.self.name}（${orientWord(m.self)}）</span>代表。${meaning(m.self)}这是你观察自己的方式，但不一定是全部事实。</p>`;
  act3 += `<p>外在环境由<span class="ghost-name">${m.env.name}（${orientWord(m.env)}）</span>代表。${meaning(m.env)}</p>`;
  act3 += `<p>希望与恐惧藏于<span class="ghost-name">${m.hope.name}（${orientWord(m.hope)}）</span>。${meaning(m.hope)}希望与恐惧同一体——理解这张，常能照亮全局。</p>`;
  act3 += `<p>最终，能量指向<span class="ghost-name">${m.result.name}（${orientWord(m.result)}）</span>。${meaning(m.result)}${m.result.reversed?'逆位的结果不是必然——它提示当前路径上的不确定因素，选择可以改变轨迹。':'顺位落在终点，是当前势能的合理延伸。它并非不可改写，但提示了值得关注的方向。'}</p>`;

  return head ? `<p>${head}</p>${act1}${act2}${act3}` : `${act1}${act2}${act3}`;
}
// 根基 vs 目标
function tensionCheck(found, crown){
  if(found.suit && crown.suit && found.suit===crown.suit) return '根基与愿望同属一个元素，内外没有分裂——这种一致性本身就是一种力量。';
  if(found.reversed !== crown.reversed) return '根基（潜意识）与目标（意识）一正一逆——表层追求与深层驱动之间存在错位。这处偏差正是牌阵想要揭示的。';
  return '将根基与目标对照：你脚下的起点，和你仰望的方向，是否真的在一条线上？';
}

// 简单转义
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ===================== 状态 ===================== */
const state = {
  spread: 'three',
  phase: 'idle',     // idle | shuffling | ready | sucking | drawing | drawn
  drawnCards: [],
  drawIndex: 0,
  _fullDeck: []
};
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ===================== 初始化牌阵选择 ===================== */
function renderSpreadTabs(){
  const wrap = $('spreadTabs');
  wrap.innerHTML = '';
  Object.entries(SPREADS).forEach(([key,sp])=>{
    const el = document.createElement('div');
    el.className = 'spread-tab' + (key===state.spread?' active':'');
    el.dataset.key = key;
    el.innerHTML = `<div class="st-name">${sp.name}</div><div class="st-meta">${sp.meta}</div>`;
    el.addEventListener('click', ()=>{
      if(state.phase==='shuffling'||state.phase==='drawing') return;
      state.spread = key;
      renderSpreadTabs();
      resetTable();
    });
    wrap.appendChild(el);
  });
}

function resetTable(){
  state.phase='idle';
  state.drawnCards=[];
  state.drawIndex=0;
  $('table').className='table';
  $('table').innerHTML='<div class="empty-table">点击下方「开始洗牌」</div>';
  $('deckZone').innerHTML='';
  $('actionBtn').disabled=false;
  $('actionBtn').textContent='开始洗牌';
  $('resetBtn').style.display='none';
  setStep(1);
  setStatus('已选择「<span class="hl">'+SPREADS[state.spread].name+'</span>」，点下方按钮开始洗牌');
}

/* ===================== 步骤指示 ===================== */
function setStep(n){
  [1,2,3].forEach(i=>{ $('stp'+i).classList.toggle('on', i<=n); });
}
function setStatus(html){ $('status').innerHTML = html; }

/* ===================== 抽牌逻辑（无摄像头，触屏抽） ===================== *//* ===================== 洗牌 / 抽牌 ===================== */
function shuffleDeck(){
  const d=TAROT_DECK.map(c=>({...c, reversed: Math.random()<0.5}));
  for(let i=d.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
  return d;
}

async function startShuffle(){
  state.phase='shuffling';
  state.drawIndex=0;
  state.drawnCards=[];
  $('actionBtn').disabled=true;
  $('resetBtn').style.display='none';
  setStep(2);
  setStatus('洗牌中…让牌接住你此刻的心绪');

  // 渲染牌桌空槽位 + 牌堆
  const sp=SPREADS[state.spread];
  const table=$('table');
  table.className='table'+(sp.layout==='celtic'?' celtic':'');
  table.innerHTML='';
  sp.positions.forEach((pos)=>{
    const slot=document.createElement('div');
    slot.className='slot empty';
    slot.dataset.key=pos.key;
    slot.innerHTML=`<div class="pos-label-empty">${pos.label}</div>`;
    table.appendChild(slot);
  });

  const deckZone=$('deckZone');
  deckZone.innerHTML='';
  const deck=document.createElement('div');
  deck.className='deck';
  deck.id='deck';
  for(let i=0;i<6;i++){
    const dc=document.createElement('div');
    dc.className='deck-card'+(i===5?' deck-top':'');
    dc.style.cssText=`background:linear-gradient(135deg,#5b8dd0,#3b6fb0);border:2px solid rgba(255,255,255,0.85);transform:translate(${i*1.5}px,${-i*1.5}px) rotate(${(i-3)*1.5}deg);box-shadow:0 6px 16px rgba(91,141,208,0.3);`;
    deck.appendChild(dc);
  }
  const hint=document.createElement('div');
  hint.className='deck-hint';
  hint.id='deckHint';
  hint.textContent='点击抽牌';
  deck.appendChild(hint);
  deckZone.appendChild(deck);

  // 洗牌抖动
  for(let k=0;k<4;k++){
    deck.style.transition='transform .2s';
    deck.style.transform=`rotate(${Math.random()*6-3}deg) translate(${(Math.random()-0.5)*6}px,${(Math.random()-0.5)*4}px)`;
    await sleep(220);
  }
  deck.style.transform='rotate(0) translate(0,0)';
  await sleep(200);

  const full=shuffleDeck();
  state._fullDeck=full;
  state.drawnCards=full.slice(0,sp.count);
  state.phase='ready';
  $('actionBtn').disabled=false;
  $('actionBtn').textContent='直接抽牌（全抽）';
  $('resetBtn').style.display='inline-block';
  setStatus(`点击牌堆抽牌  ✦ 还剩 <span class="hl">${sp.count}</span> 张`);

  deck.addEventListener('click', drawOneCard);
}

// 抽一张：震颤 → 飞出 → 翻牌
async function drawOneCard(){
  if(state.phase!=='ready') return;
  const deck=$('deck');
  if(!deck) return;
  const idx=state.drawIndex;
  if(idx>=state.drawnCards.length){ return; }
  const sp=SPREADS[state.spread];

  // 震颤
  state.phase='sucking';
  deck.classList.add('shaking');
  await sleep(700);
  deck.classList.remove('shaking');

  const cardData=state.drawnCards[idx];

  // 找到对应空槽位，按位置key匹配
  const pos=sp.positions[idx];
  const slot=table.querySelector(`.slot.empty[data-key="${pos.key}"]`)||table.querySelectorAll('.slot.empty')[idx]||table.children[idx];
  if(!slot) return;
  const sr=slot.getBoundingClientRect();

  // 飞牌元素
  const dr=deck.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='card fly-card';
  if(cardData.reversed) fly.classList.add('reversed');
  fly.innerHTML=`
    <div class="inner">
      <div class="face back"><div class="mandala"></div></div>
      <div class="face front">
        ${cardData.reversed?'<div class="f-rev">逆</div>':''}
        <div class="f-top">${pos.label}</div>
        <div class="f-icon">${cardData.icon}</div>
        <div class="f-name">${cardData.name}</div>
        <div class="f-en">${cardData.en}</div>
      </div>
    </div>`;
  document.body.appendChild(fly);
  fly.style.left=dr.left+'px'; fly.style.top=dr.top+'px';
  fly.style.width=dr.width+'px'; fly.style.height=dr.height+'px';
  fly.offsetHeight;

  // 飞向槽位+翻转
  setTimeout(()=>{
    fly.classList.add('flipping');
    fly.style.left=sr.left+'px'; fly.style.top=sr.top+'px';
    fly.style.width=sr.width+'px'; fly.style.height=sr.height+'px';
  },50);

  // 落地：把飞牌换成真正的牌
  setTimeout(()=>{
    fly.remove();
    // 用真正牌替换空槽
    const real=document.createElement('div');
    real.className='card flipped';
    if(cardData.reversed) real.classList.add('reversed');
    real.innerHTML=`
      <div class="inner">
        <div class="face back"><div class="mandala"></div></div>
        <div class="face front">
          ${cardData.reversed?'<div class="f-rev">逆</div>':''}
          <div class="f-top">${pos.label}</div>
          <div class="f-icon">${cardData.icon}</div>
          <div class="f-name">${cardData.name}</div>
          <div class="f-en">${cardData.en}</div>
        </div>
      </div>`;
    slot.classList.remove('empty');
    slot.classList.add('filled');
    slot.innerHTML='';
    slot.appendChild(real);
    const lbl=document.createElement('div');
    lbl.className='pos-label';
    lbl.textContent=pos.label;
    if(sp.layout!=='celtic') slot.appendChild(lbl);
    emitSparks(sr.left+sr.width/2, sr.top+sr.height/2, 8);
  },550);

  state.drawIndex=idx+1;
  await sleep(350);

  if(state.drawIndex>=sp.count){
    // 抽完：牌堆淡出
    if(deck) deck.style.transition='opacity .4s,transform .4s',deck.style.opacity='0',deck.style.transform='translateY(20px)';
    setTimeout(()=>{ if(deck) deck.remove(); },500);
    await sleep(500);
    state.phase='drawn';
    setStep(3);
    setStatus('解读已生成 ✦');
    showReading();
  }else{
    state.phase='ready';
    setStatus(`还剩 <span class="hl">${sp.count-state.drawIndex}</span> 张，点击牌堆继续抽牌`);
  }
}

// 备用：一键全抽（跳过震颤逐张，直接翻完全部）
function quickDrawAll(){
  if(state.phase!=='ready'&&state.phase!=='sucking') return;
  const deck=$('deck');
  if(deck) deck.remove();
  const sp=SPREADS[state.spread];
  if(state.drawnCards.length===0){
    state.drawnCards=(state._fullDeck||shuffleDeck()).slice(0,sp.count);
  }
  state.drawIndex=sp.count;
  triggerDraw();
}

async function triggerDraw(){
  state.phase='drawing';
  $('actionBtn').disabled=true;
  const sp=SPREADS[state.spread];
  const table=$('table');
  const slots=table.querySelectorAll('.slot.empty');

  // 隐藏牌堆
  const deck=$('deck');
  if(deck) deck.style.transition='opacity .3s',deck.style.opacity='0',setTimeout(()=>{ if(deck) deck.remove(); },300);

  // 把每个空槽位替换为对应的牌
  slots.forEach((slot, i)=>{
    const cd=state.drawnCards[i];
    const pos=sp.positions[i];
    if(!cd) return;
    setTimeout(()=>{
      slot.classList.remove('empty');
      slot.classList.add('filled');
      slot.innerHTML='';
      const card=document.createElement('div');
      card.className='card flipped';
      if(cd.reversed) card.classList.add('reversed');
      card.innerHTML=`
        <div class="inner">
          <div class="face back"><div class="mandala"></div></div>
          <div class="face front">
            ${cd.reversed?'<div class="f-rev">逆</div>':''}
            <div class="f-top">${pos.label}</div>
            <div class="f-icon">${cd.icon}</div>
            <div class="f-name">${cd.name}</div>
            <div class="f-en">${cd.en}</div>
          </div>
        </div>`;
      slot.appendChild(card);
      const lbl=document.createElement('div');
      lbl.className='pos-label';
      lbl.textContent=pos.label;
      if(sp.layout!=='celtic') slot.appendChild(lbl);
      const r=card.getBoundingClientRect();
      emitSparks(r.left+r.width/2, r.top+r.height/2, 6);
    }, i*200);
  });

  setStatus('翻牌中…');
  await sleep(slots.length*200+800);
  state.phase='drawn';
  setStep(3);
  setStatus('解读已生成 ✦');
  showReading();
}

function emitSparks(x,y,n){
  for(let i=0;i<n;i++){
    const s=document.createElement('div');
    s.className='spark';
    s.style.left=x+'px'; s.style.top=y+'px';
    document.body.appendChild(s);
    const ang=Math.random()*Math.PI*2, dist=40+Math.random()*90;
    const tx=Math.cos(ang)*dist, ty=Math.sin(ang)*dist-30;
    s.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${tx}px,${ty}px) scale(0)`,opacity:0}
    ],{duration:700+Math.random()*400,easing:'cubic-bezier(.2,.6,.3,1)'}).onfinish=()=>s.remove();
  }
}

/* ===================== 解读展示 ===================== */
function showReading(){
  const sp=SPREADS[state.spread];
  const q=$('questionInput').value;
  $('rTitle').textContent=sp.name;
  $('rSub').textContent=sp.meta;
  $('rQ').textContent = q.trim()? '问：'+q.trim() : '';

  // 故事
  $('story').innerHTML = buildStory(state.spread, state.drawnCards, q);

  // 逐牌详情
  const cd=$('cardsDetail');
  cd.innerHTML='';
  sp.positions.forEach((pos,i)=>{
    const c=state.drawnCards[i];
    const item=document.createElement('div');
    item.className='cd-item';
    item.innerHTML=`
      <div class="cd-mini${c.reversed?' rev':''}">
        <div class="m-icon">${c.icon}</div>
        <div class="m-name">${c.name}</div>
      </div>
      <div class="cd-body">
        <div class="cd-pos">${pos.label}</div>
        <div class="cd-name">${c.name}
          <span class="orient ${c.reversed?'rev':'up'}">${c.reversed?'逆位':'正位'}</span>
        </div>
        <div class="cd-keys">${(c.keywords||[]).map(k=>`<span class="k">${k}</span>`).join('')}</div>
        <div class="cd-text">${meaning(c)}</div>
      </div>`;
    cd.appendChild(item);
  });

  $('reading').classList.add('show');
  $('reading').scrollTop=0;
}

function closeReading(){ $('reading').classList.remove('show'); }
function againDraw(){
  closeReading();
  state.phase='idle';
  startShuffle();
}

/* ===================== 启动 ===================== */
async function startApp(){
  $('intro').classList.add('hide');
  await sleep(450);
  $('stage').style.display='flex';
  renderSpreadTabs();
  resetTable();
  spawnDust();
}

function spawnDust(){
  const sky=$('sky');
  for(let i=0;i<26;i++){
    const d=document.createElement('div');
    d.className='dust';
    const sz=1.5+Math.random()*2.5;
    d.style.width=sz+'px'; d.style.height=sz+'px';
    d.style.left=Math.random()*100+'%';
    d.style.top=Math.random()*100+'%';
    d.style.animationDelay=Math.random()*4+'s';
    sky.appendChild(d);
  }
}

/* ===================== 事件绑定 ===================== */
$('startBtn').addEventListener('click', startApp);
$('actionBtn').addEventListener('click', ()=>{
  if(state.phase==='idle') startShuffle();
  else if(state.phase==='ready'||state.phase==='sucking') quickDrawAll();
  else if(state.phase==='drawn') againDraw();
});
$('resetBtn').addEventListener('click', ()=>{ resetTable(); });
$('ceSkip').addEventListener('click', ()=>{ $('camError').classList.remove('show'); });
$('rAgain').addEventListener('click', againDraw);
$('rClose').addEventListener('click', closeReading);
</script>
</body>
